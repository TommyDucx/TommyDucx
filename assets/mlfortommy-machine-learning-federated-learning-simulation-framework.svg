<svg xmlns="http://www.w3.org/2000/svg" width="991" height="40" viewBox="0 0 991 40"><style>.t{fill:#24292f;}@media (prefers-color-scheme: dark){.t{fill:#e6edf3;}}</style><text font-size="24" xml:space="preserve"><tspan class="t" x="14" y="30" font-family="Georgia,'Times New Roman',serif">𝔐𝔏𝔉𝔬𝔯𝔗𝔬𝔪𝔪𝔶: 𝔐𝔞𝔠𝔥𝔦𝔫𝔢 𝔏𝔢𝔞𝔯𝔫𝔦𝔫𝔤 + 𝔉𝔢𝔡𝔢𝔯𝔞𝔱𝔢𝔡 𝔏𝔢𝔞𝔯𝔫𝔦𝔫𝔤 𝔖𝔦𝔪𝔲𝔩𝔞𝔱𝔦𝔬𝔫 𝔉𝔯𝔞𝔪𝔢𝔴𝔬𝔯𝔨</tspan></text></svg>